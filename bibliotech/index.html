<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/style.css">
    <title>Bibliotech</title>
</head>

<body>
    <div class="container">
        <div class="logo">
            <h1>logo</h1>
        </div>
        <div class="main">
            <!--LEMBRA SEU ANIMAL, textField so pra texto de escrever-->
            <!--Mudar o nome dessa variavel depois-->
            <div class="infoLivro">
                <h2>Info Livro</h2>
                <form>
                    <div class="textField">
                        <label>Titulo</label>
                        <input type="text" id="nome" required>
                    </div>
                    <label>Gênero</label>
                    <select id="genero">
                        <option value="romance">Romance</option>
                        <option value="fantasia">Fantasia</option>
                        <option value="ficcaoCientifica">Ficção Científica</option>
                        <option value="suspense">Suspense</option>
                        <option value="terror">Terror</option>
                        <option value="biografia">Biografia</option>
                        <option value="poesia">Poesia</option>
                        <option value="autoAjuda">Autoajuda</option>
                    </select>
                </form>
            </div>
            <div class="infoAluno">
                <h2>Informação do aluno</h2>
                    <form id="infoAluno">
                        <div class="textField">
                        <label>Nome do aluno</label>
                        <input type="text" id="nomeAluno" required>
                    </div>
                        <label>Série</label>
                        <select id="serie">
                            <option value="primeiraSerie">1°</option>
                            <option value="segundaSerie">2°</option>
                            <option value="terceiraSerie">3°</option>
                        </select>
                        <label>Turma</label>
                        <select id="turma">
                            <option value="turmaA">A</option>
                            <option value="turmaB">B</option>
                            <option value="turmaC">C</option>
                        </select>

                        <label>Data da coleta</label>
                        <input type="datetime-local" id="data">
                        <label>Data de Prevista para a Devolução</label>
                        <input type="datetime-local" id="dataRetorno">
                        <button type="submit" class="enviar" id="enviar">Enviar</button>
                    </form>
                </div>
            </div>
            <div class="listaAgendamento">
                <h3 class="tituloLista">Lista de agendamento</h3>
                <ul class="lista" id="lista">
                </ul>
            </div>
            <button id="apagar">Apagar selecionados</button>
        </div>
    </div>
    <script src="./src/js/script.js"></script>
</body>

</html>
